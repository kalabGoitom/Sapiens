<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sapiens Mekelle</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon" />
  </head>
  <body>
    <!-- Navigation -->
    <header>
      <div class="container">
        <!-- logo container -->
        <div class="logo">
          <a href="#home"><img src="img/logo.png" alt="sapiens logo" /></a>
        </div>

        <!-- navigation container -->
        <nav class="nav-container">
          <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#reviews">Reviews</a></li>
            <li><a href="#gallery">Gallery</a></li>
          </ul>
        </nav>

        <!-- call to action button -->
        <div class="cta">
          <a
            href="tel:+ 094 366 6677
"
          >
            Call Us</a
          >
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main>
      <!-- hero section -->
      <section id="home">
        <div class="container">
          <div class="hero-content">
            <h1>Hot Pizza. Juicy Burgers. Great Vibes.</h1>
            <p>
              From juicy burgers to delicious pizzas, enjoy your favorite meals
              in a warm and modern atmosphere.
            </p>
            <a href="#menu" class="btn">Explore Our Menu</a>
          </div>
        </div>
      </section>

      <!-- about section -->
      <section id="about"></section>

      <!-- menu section -->
      <section id="menu"></section>

      <!-- review section -->
      <section id="reviews"></section>

      <!-- gallery section -->
      <section id="gallery"></section>
    </main>

    <!-- footer -->
    <footer>
      <!-- map section -->
      <div></div>

      <!-- social section -->
      <div></div>

      <!-- footer section -->
      <div></div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
